<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Heaven's By Elena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blanc: #FFFFFF;
      --rose-poudre: #E8C4B8;
      --noir: #1A1A1A;
      --gris: #8A8A8A;
      --gris-clair: #F5F5F5;
      --bordure: #E0E0E0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gris-clair);
      color: var(--noir);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2rem;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--bordure);
    }

    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      color: var(--gris);
    }

    .tab-btn.active {
      color: var(--noir);
      border-bottom-color: var(--rose-poudre);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--bordure);
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--rose-poudre);
      box-shadow: 0 0 0 3px rgba(232, 196, 184, 0.1);
    }

    .btn {
      padding: 10px 24px;
      background: var(--noir);
      color: var(--blanc);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background: var(--rose-poudre);
      color: var(--noir);
    }

    .btn-secondary {
      background: var(--gris-clair);
      color: var(--noir);
      border: 1px solid var(--bordure);
    }

    .btn-secondary:hover {
      background: var(--bordure);
    }

    .btn-danger {
      background: #E74C3C;
    }

    .btn-danger:hover {
      background: #C0392B;
    }

    .product-form {
      background: var(--blanc);
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-full {
      grid-column: 1 / -1;
    }

    .products-table {
      background: var(--blanc);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--gris-clair);
      padding: 16px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--bordure);
    }

    td {
      padding: 16px;
      border-bottom: 1px solid var(--bordure);
    }

    tr:hover {
      background: var(--gris-clair);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    .alert {
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .alert-success {
      background: #D4EDDA;
      color: #155724;
      border: 1px solid #C3E6CB;
    }

    .alert-error {
      background: #F8D7DA;
      color: #721C24;
      border: 1px solid #F5C6CB;
    }

    .image-preview {
      max-width: 200px;
      max-height: 200px;
      border-radius: 4px;
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--gris);
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.85rem;
      }

      th, td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Panel - Heaven's By Elena</h1>

    <div class="tabs">
      <button class="tab-btn active" data-tab="products">Produits</button>
      <button class="tab-btn" data-tab="orders">Commandes</button>
      <button class="tab-btn" data-tab="reviews">Avis</button>
    </div>

    <!-- TAB PRODUITS -->
    <div id="products" class="tab-content active">
      <div class="product-form">
        <h2>Ajouter/Modifier un produit</h2>
        <form id="product-form">
          <div class="form-row">
            <div class="form-group">
              <label>Nom du produit *</label>
              <input type="text" id="product-name" required>
            </div>
            <div class="form-group">
              <label>Prix (€) *</label>
              <input type="number" id="product-price" step="0.01" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Catégorie *</label>
              <select id="product-category" required>
                <option value="">-- Choisir --</option>
                <option value="boucles">Boucles d'oreille</option>
                <option value="colliers">Colliers</option>
                <option value="parrures">Parrures</option>
                <option value="bracelets">Bracelets</option>
                <option value="bougies">Bougies</option>
                <option value="lunettes">Lunettes</option>
                <option value="sacs">Sacs à mains</option>
              </select>
            </div>
            <div class="form-group">
              <label>Type *</label>
              <select id="product-type" required>
                <option value="">-- Choisir --</option>
                <option value="artisanal">Création artisanale</option>
                <option value="revente">Revente</option>
              </select>
            </div>
          </div>

          <div class="form-group form-full">
            <label>Description *</label>
            <textarea id="product-description" required></textarea>
          </div>

          <div class="form-group form-full">
            <label>Photo du produit</label>
            <input type="file" id="product-image" accept="image/*">
            <img id="image-preview" class="image-preview" style="display: none;">
          </div>

          <div class="form-row">
            <button type="submit" class="btn">Sauvegarder le produit</button>
            <button type="button" class="btn btn-secondary" id="reset-form">Annuler</button>
          </div>
        </form>
      </div>

      <div id="alert-container"></div>

      <div class="products-table">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Catégorie</th>
              <th>Prix</th>
              <th>Type</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr>
              <td colspan="5" class="loading">Chargement...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB COMMANDES -->
    <div id="orders" class="tab-content">
      <div class="products-table">
        <table>
          <thead>
            <tr>
              <th>Commande #</th>
              <th>Client</th>
              <th>Total</th>
              <th>Statut</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr>
              <td colspan="6" class="loading">Chargement...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB AVIS -->
    <div id="reviews" class="tab-content">
      <div class="products-table">
        <table>
          <thead>
            <tr>
              <th>Produit</th>
              <th>Client</th>
              <th>Note</th>
              <th>Commentaire</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="reviews-tbody">
            <tr>
              <td colspan="6" class="loading">Chargement...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // CONFIG SUPABASE
    const SUPABASE_URL = 'https://emvbgrjsxizfvebbijga.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtdmJncmpzeGl6ZnZlYmJpamdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDIzMjEsImV4cCI6MjA4ODI3ODMyMX0.h8mmECW6YXHKrz9oz3lYaxJbG5kzf6B4peEC-VknFgs';
    
    // CONFIG CLOUDINARY
    const CLOUDINARY_CLOUD = 'dxvohubja';
    const CLOUDINARY_UPLOAD_PRESET = 'heaven_preset';

    // Variables globales
    let currentProductId = null;
    let products = [];
    let orders = [];
    let reviews = [];

    // TAB SWITCHING
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.tab).classList.add('active');
        
        if (e.target.dataset.tab === 'orders') loadOrders();
        if (e.target.dataset.tab === 'reviews') loadReviews();
      });
    });

    // FORM SUBMISSION
    document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      await saveProduct();
    });

    document.getElementById('reset-form').addEventListener('click', () => {
      document.getElementById('product-form').reset();
      currentProductId = null;
      document.getElementById('image-preview').style.display = 'none';
    });

    // IMAGE PREVIEW
    document.getElementById('product-image').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const preview = document.getElementById('image-preview');
          preview.src = event.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // FUNCTIONS
    async function saveProduct() {
      const name = document.getElementById('product-name').value;
      const price = parseFloat(document.getElementById('product-price').value);
      const category = document.getElementById('product-category').value;
      const type = document.getElementById('product-type').value;
      const description = document.getElementById('product-description').value;
      const imageFile = document.getElementById('product-image').files[0];

      let imageUrl = null;

      // Upload image to Cloudinary if exists
      if (imageFile) {
        const formData = new FormData();
        formData.append('file', imageFile);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

        try {
          const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
            method: 'POST',
            body: formData
          });
          const data = await response.json();
          imageUrl = data.secure_url;
        } catch (error) {
          showAlert('Erreur lors de l\'upload de l\'image', 'error');
          return;
        }
      }

      // Save to Supabase
      try {
        const badge = type === 'artisanal' ? 'Création artisanale' : 'Revente';
        
        const payload = {
          name,
          price,
          category,
          description,
          badge,
          image_url: imageUrl
        };

        let response;
        if (currentProductId) {
          // UPDATE
          response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${currentProductId}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            },
            body: JSON.stringify(payload)
          });
        } else {
          // CREATE
          response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            },
            body: JSON.stringify(payload)
          });
        }

        if (response.ok) {
          showAlert('Produit sauvegardé avec succès!', 'success');
          document.getElementById('product-form').reset();
          document.getElementById('image-preview').style.display = 'none';
          currentProductId = null;
          loadProducts();
        } else {
          showAlert('Erreur lors de la sauvegarde', 'error');
        }
      } catch (error) {
        showAlert('Erreur: ' + error.message, 'error');
      }
    }

    async function loadProducts() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        
        products = await response.json();
        displayProducts();
      } catch (error) {
        console.error('Erreur:', error);
      }
    }

    function displayProducts() {
      const tbody = document.getElementById('products-tbody');
      
      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="loading">Aucun produit</td></tr>';
        return;
      }

      tbody.innerHTML = products.map(product => `
        <tr>
          <td>${product.name}</td>
          <td>${product.category}</td>
          <td>${product.price.toFixed(2)} €</td>
          <td>${product.badge}</td>
          <td>
            <div class="actions">
              <button class="btn btn-small btn-secondary" onclick="editProduct(${product.id})">Modifier</button>
              <button class="btn btn-small btn-danger" onclick="deleteProduct(${product.id})">Supprimer</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function editProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      document.getElementById('product-name').value = product.name;
      document.getElementById('product-price').value = product.price;
      document.getElementById('product-category').value = product.category;
      document.getElementById('product-description').value = product.description;
      
      if (product.image_url) {
        const preview = document.getElementById('image-preview');
        preview.src = product.image_url;
        preview.style.display = 'block';
      }

      currentProductId = id;
      window.scrollTo(0, 0);
    }

    async function deleteProduct(id) {
      if (!confirm('Êtes-vous sûr de vouloir supprimer ce produit?')) return;

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
          method: 'DELETE',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        if (response.ok) {
          showAlert('Produit supprimé!', 'success');
          loadProducts();
        }
      } catch (error) {
        showAlert('Erreur lors de la suppression', 'error');
      }
    }

    async function loadOrders() {
      // À implémenter
      document.getElementById('orders-tbody').innerHTML = '<tr><td colspan="6" class="loading">Bientôt disponible</td></tr>';
    }

    async function loadReviews() {
      // À implémenter
      document.getElementById('reviews-tbody').innerHTML = '<tr><td colspan="6" class="loading">Bientôt disponible</td></tr>';
    }

    function showAlert(message, type) {
      const container = document.getElementById('alert-container');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      container.appendChild(alert);
      setTimeout(() => alert.remove(), 4000);
    }

    // INIT
    loadProducts();
  </script>
</body>
</html>
