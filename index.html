<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heaven's By Elena — Bientôt ouvert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== VARIABLES CSS ========== */
    :root {
      --blanc: #FFFFFF;
      --rose-poudre: #E8C4B8;
      --rose-clair: #F5E6E0;
      --noir: #1A1A1A;
      --gris: #8A8A8A;
      --fond-casse: #FAFAFA;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: var(--noir);
      background: var(--blanc);
      line-height: 1.6;
    }

    /* ========== CONTAINER PRINCIPAL ========== */
    .coming-soon-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 40px;
      background: linear-gradient(135deg, var(--blanc) 0%, var(--rose-clair) 100%);
    }

    /* ========== CONTENU ========== */
    .coming-soon-content {
      text-align: center;
      max-width: 700px;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== LOGO ========== */
    .logo {
      margin-bottom: 40px;
    }

    .logo-heavens {
      font-family: 'Great Vibes', cursive;
      font-size: 3.5rem;
      color: var(--noir);
      display: block;
      line-height: 1.2;
    }

    .logo-by {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      font-variant: small-caps;
      letter-spacing: 0.4em;
      color: var(--noir);
      margin-top: -8px;
      display: block;
    }

    /* ========== TITRE PRINCIPAL ========== */
    .coming-soon-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--noir);
    }

    /* ========== LIGNE DÉCORATIVE ========== */
    .decorative-line {
      width: 60px;
      height: 1px;
      background: var(--rose-poudre);
      margin: 24px auto 32px auto;
    }

    /* ========== DESCRIPTION ========== */
    .coming-soon-description {
      font-size: 1rem;
      color: var(--gris);
      margin-bottom: 40px;
      line-height: 1.8;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .coming-soon-description p {
      margin-bottom: 16px;
    }

    /* ========== BARRE DE PROGRESSION ========== */
    .progress-container {
      margin: 50px 0;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .progress-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 12px;
      display: block;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--rose-clair);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--rose-poudre);
      width: 65%;
      animation: loadingAnimation 2s ease-in-out infinite;
      border-radius: 2px;
    }

    @keyframes loadingAnimation {
      0% { width: 65%; }
      50% { width: 80%; }
      100% { width: 65%; }
    }

    /* ========== RÉSEAUX SOCIAUX ========== */
    .social-links {
      margin-top: 60px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .social-link {
      text-decoration: none;
      color: var(--noir);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding-bottom: 4px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    .social-link:hover {
      border-bottom-color: var(--rose-poudre);
      color: var(--rose-poudre);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .coming-soon-container {
        padding: 40px 25px;
      }

      .logo-heavens {
        font-size: 2.5rem;
      }

      .coming-soon-title {
        font-size: 1.6rem;
      }

      .coming-soon-description {
        font-size: 0.95rem;
      }

      .email-form {
        flex-direction: column;
      }

      .email-input,
      .email-submit {
        width: 100%;
      }

      .social-links {
        gap: 20px;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 480px) {
      .coming-soon-container {
        padding: 30px 20px;
      }

      .logo-heavens {
        font-size: 2rem;
      }

      .coming-soon-title {
        font-size: 1.3rem;
      }

      .btn-notify {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Contenu principal -->
  <div class="coming-soon-container">
    <div class="coming-soon-content">
      
      <!-- Logo -->
      <div class="logo">
        <span class="logo-heavens">Heaven's</span>
        <span class="logo-by">By Elena</span>
      </div>

      <!-- Titre -->
      <h1 class="coming-soon-title">Bientôt Ouvert</h1>

      <!-- Ligne décorative -->
      <div class="decorative-line"></div>

      <!-- Description -->
      <div class="coming-soon-description">
        <p>Nous préparons quelque chose de magnifique pour vous.</p>
        <p>Notre boutique de bijoux faits main ouvrira très bientôt. Soyez parmi les premiers à découvrir nos créations exclusives.</p>
      </div>

      <!-- Barre de progression -->
      <div class="progress-container">
        <span class="progress-label">Bientôt</span>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>

      <!-- Réseaux sociaux -->
      <div class="social-links">
        <a href="https://www.tiktok.com/@elenaheavensofficiel" class="social-link" target="_blank" rel="noopener noreferrer">TikTok</a>
        <a href="https://youtube.com/@elenaheavensofficiel" class="social-link" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://instagram.com" class="social-link" target="_blank" rel="noopener noreferrer">Instagram</a>
      </div>

    </div>
  </div>

  </body>
</html>
